/* =========================================================
   2) 有給の比例付与テーブル（労働基準法）
   ========================================================= */
// ブラケット: 6ヶ月, 1年6ヶ月, 2年6ヶ月, 3年6ヶ月, 4年6ヶ月, 5年6ヶ月, 6年6ヶ月以上
const GRANT_TABLE = {
  4: [7, 8, 9, 10, 12, 13, 15],
  3: [5, 6, 6, 8, 9, 10, 11],
  2: [3, 4, 4, 5, 6, 6, 7],
  1: [1, 2, 2, 3, 3, 3, 3],
  5: [10, 11, 12, 14, 16, 18, 20] // 週5日以上（フルタイム相当）
};

function monthsBetween(hireDateStr, now) {
  const hire = parseFlexibleDate(hireDateStr);
  if (!hire) return -1;
  return (now.getFullYear() - hire.getFullYear()) * 12 + (now.getMonth() - hire.getMonth());
}

function calcAnnualGrant(hireDateStr, weeklyDays) {
  if (!hireDateStr || !weeklyDays) return 0;
  const months = monthsBetween(hireDateStr, new Date());
  if (months < 6) return 0;
  // 6ヶ月刻みのブラケット番号（0〜6）
  let bracket = Math.floor((months - 6) / 12) + 1;
  bracket = Math.min(bracket, 7) - 1;
  const table = GRANT_TABLE[weeklyDays] || GRANT_TABLE[4];
  return table[Math.max(0, Math.min(bracket, table.length - 1))];
}

function waitForAuth(timeoutMs) {
  return new Promise(resolve => {
    if (authReady) return resolve();
    const started = Date.now();
    const iv = setInterval(() => {
      if (authReady || Date.now() - started > timeoutMs) {
        clearInterval(iv);
        resolve();
      }
    }, 100);
  });
}

function last3OfEmployeeCode(code) {
  const digits = (code || "").replace(/\D/g, "");
  return digits.slice(-3);
}

function saveOrClearLoginId(loginId, code3) {

    localStorage.removeItem("assistRoumuLoginId");

  }
}

function saveOrClearAdminPass(pass) {

  if (remember && remember.checked) {

async function handleStaffLogin() {
  const loginId = document.getElementById("loginId").value.trim();
  const code3 = document.getElementById("loginCode3").value.trim();
  if (!loginId) return alert("ログインIDを入力してください");
  if (!/^\d{3}$/.test(code3)) return alert("従業員コードの下3桁（数字3桁）を入力してください");

  if (!firebaseReady) {
    // Firebase未設定時のダミーユーザー（動作確認用）。デモの従業員コードは "1-0-001" 固定です。
    if (code3 !== "001") return alert("ログインIDまたは従業員コードが正しくありません。");

    state.screen = "staffHome";
    return render();
  }

  await waitForAuth(3000);

  try {
    const snap = await db.collection("employees").where("loginId", "==", loginId).limit(1).get();
    if (snap.empty) return alert("ログインIDまたは従業員コードが正しくありません。");

    const empData = doc.data();
    if (last3OfEmployeeCode(empData.employeeCode) !== code3) {
      return alert("ログインIDまたは従業員コードが正しくありません。");
    }
    if (empData.status === "resigned") {
      return alert("このログインIDは現在ご利用いただけません。本社にお問い合わせください。");
    }
    saveOrClearLoginId(loginId, code3);
    state.currentUser = { id: doc.id, role: "staff", ...empData };
    state.screen = "staffHome";
    render();
    subscribeStaffLeaveRequests();
    subscribeStaffOrders();
    subscribeStaffMessages();
    subscribeStaffPayslips();
  } catch (e) {
    alert("接続エラーが発生しました: " + e.message);

}

async function submitOrder() {
  const place = document.getElementById("orderPlace").value.trim();
  let item = state.orderItem || ITEM_MASTER[0];
  if (item === "__free__") {
    item = (document.getElementById("orderFreeText").value || "").trim();
    if (!item) return alert("ほしいものを書いてください");
  }
  const qty = state.orderQty || 1;
  if (!place) return alert("発注する場所を入れてください");

  const data = {
    employeeId: state.currentUser.id,
    employeeName: state.currentUser.name,
    area: state.currentUser.area || "",
    place, item, qty,
    status: "pending",
    createdAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };

  if (!firebaseReady) {
    state.orders = state.orders || [];
    state.orders.unshift({ ...data, id: "demo-" + Date.now() });
    state.orderItem = null; state.orderQty = 1;
    state.screen = "staffHome";
    render();
    alert("たのみました！本社にとどきました。");
    return;
  }
  try {
    await db.collection("orders").add(data);
    state.orderItem = null; state.orderQty = 1;
    state.screen = "staffHome";
    render();
    alert("たのみました！本社にとどきました。");
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

async function markReceived(id) {
  if (!firebaseReady) {
    const o = state.orders.find(x => x.id === id);
    if (o) o.status = "received";
    return render();

  try {
    await db.collection("orders").doc(id).update({ status: "received" });

}

function subscribeStaffOrders() {
  if (!firebaseReady) return;
  db.collection("orders")
    .where("employeeId", "==", state.currentUser.id)
    .onSnapshot(snap => {
      const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      rows.sort((a, b) => {
        const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
        const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
        return tb - ta;
      });
      state.orders = rows;
      render();
    }, err => {
      console.error("orders購読エラー", err);
    });
}

}

function compressImageToBase64(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * (maxWidth / w)); w = maxWidth; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelect(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (file.size > 15 * 1024 * 1024) { alert("写真のサイズが大きすぎます"); return; }
  try {

/* =========================================================
   グループチャット（従業員同士・コードで参加）
   LINEのグループのように、作成した人が発行した6桁コードを
   知っている人だけが参加できる、閉じたグループチャット。
   ========================================================= */
function generateGroupCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字（0/O, 1/I）は除外
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

}

function subscribeGroupMessages(groupId) {

    .where("groupId", "==", groupId)
    .onSnapshot(snap => {

        const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;

const LEAVE_TYPES = ["欠勤（無給）", "遅刻・早退", "忌引き", "有給休暇"];

function renderLeaveForm() {
  const type = state.leaveFormType || LEAVE_TYPES[0];
  const isPaid = type === "有給休暇";

  let dateFieldHtml;
  if (isPaid) {
    const today = new Date();
    const minDate = new Date(today); minDate.setDate(minDate.getDate() + 14);
    const maxDate = new Date(today); maxDate.setMonth(maxDate.getMonth() + 1);
    const toStr = d => d.toISOString().slice(0, 10);
    const weekdayJp = ["日", "月", "火", "水", "木", "金", "土"];
    const options = [];
    const cur = new Date(minDate);
    while (cur <= maxDate) {
      const iso = toStr(cur);
      const label = `${cur.getMonth() + 1}月${cur.getDate()}日（${weekdayJp[cur.getDay()]}）`;
      options.push(`<option value="${iso}">${label}</option>`);
      cur.setDate(cur.getDate() + 1);
    }
    dateFieldHtml = `
      <label>希望日（有給休暇は2週間後〜1か月後の間で選べます）</label>
      <select id="leaveDate">${options.join("")}</select>
    `;
  } else {
    dateFieldHtml = `
      <label>日付</label>
      <input id="leaveDate" type="date" value="${state.leaveFormDate || ""}" onchange="state.leaveFormDate=this.value;" />
    `;
  }

  return `
    <div class="card">
      <p class="staff-title" style="font-size:17px;">休み・有給の申請</p>
      <label>区分</label>
      <select id="leaveType" onchange="state.leaveFormType=this.value; render();">
        ${LEAVE_TYPES.map(t => `<option value="${t}" ${t === type ? "selected" : ""}>${t}</option>`).join("")}
      </select>
      ${dateFieldHtml}
      <label>理由（にんい）</label>
      <input id="leaveReason" type="text" placeholder="通院のため" value="${(state.leaveFormReason || "").replace(/"/g, '&quot;')}" oninput="state.leaveFormReason=this.value;" />
      <button class="primary" onclick="submitLeaveRequest()">申請する</button>
      <button class="btn-back-big" onclick="state.screen='staffHome'; state.leaveFormType=null; state.leaveFormReason=''; state.leaveFormDate=''; render();">やめる</button>
    </div>
  `;
}

async function submitLeaveRequest() {
  const date = document.getElementById("leaveDate").value;
  const type = document.getElementById("leaveType").value;
  const reason = document.getElementById("leaveReason").value;
  if (!date) return alert("日付を選んでください");

  if (type === "有給休暇") {
    const today = new Date();
    const minDate = new Date(today); minDate.setDate(minDate.getDate() + 14);
    const maxDate = new Date(today); maxDate.setMonth(maxDate.getMonth() + 1);
    const picked = new Date(date);
    if (picked < minDate || picked > maxDate) {
      return alert("有給休暇の申請は2週間後から1か月後までの日付でお願いします");
    }
  }

  const data = {
    employeeId: state.currentUser.id,
    employeeName: state.currentUser.name,
    area: state.currentUser.area || "",
    date, type, reason,
    status: "pending",
    createdAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };

  if (!firebaseReady) {
    state.leaveRequests.unshift({ ...data, id: "demo-" + Date.now() });
    state.screen = "staffHome";
    state.leaveFormType = null; state.leaveFormReason = ""; state.leaveFormDate = "";
    return render();
  }

  try {
    await db.collection("leaveRequests").add(data);
    state.screen = "staffHome";
    state.leaveFormType = null; state.leaveFormReason = ""; state.leaveFormDate = "";
    render();
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

  db.collection("leaveRequests")
    .where("employeeId", "==", state.currentUser.id)
    .onSnapshot(snap => {
      const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      rows.sort((a, b) => {

// 曜日ごとの勤務時間から「月・水・金」のような一覧表示用サマリーを作る（未入力時は旧shiftDaysにフォールバック）
function shiftSummary(e) {
  const days = WEEKDAY_FIELDS.filter(([key]) => (e[key] || "").trim()).map(([, label]) => label);
  if (days.length) return days.join("・");
  return e.shiftDays || "";
}

// 曜日ごとの勤務時間から「週の勤務日数」「就業時間」「休日」を自動計算する
function computeShiftDerivedFields(emp) {
  const filled = WEEKDAY_FIELDS.map(([key, label]) => [label, (emp[key] || "").trim()]).filter(([, v]) => v);
  const weeklyDays = filled.length;
  const groups = [];
  filled.forEach(([label, time]) => {
    const g = groups.find(g => g.time === time);
    if (g) g.labels.push(label); else groups.push({ time, labels: [label] });
  });
  const workHours = groups.map(g => `${g.labels.join("・")} ${g.time}`).join("、");
  const offLabels = WEEKDAY_FIELDS.map(([key, label]) => [label, (emp[key] || "").trim()]).filter(([, v]) => !v).map(([label]) => label);
  const holiday = offLabels.join("・");
  return { weeklyDays, workHours, holiday };
}

// シフト入力欄が変わるたびに、週の勤務日数・就業時間・休日の表示をその場で更新する

}

// 「1990-05-01」のような西暦だけでなく、「昭和24年9月13日」のような和暦入力も読み取れるようにする
const WAREKI_ERA_START = { "明治": 1868, "大正": 1912, "昭和": 1926, "平成": 1989, "令和": 2019 };
function parseFlexibleDate(str) {
  if (!str) return null;
  const s = str.toString().trim();

  // 和暦（例：昭和24年9月13日 / 令和元年5月1日 / 平成 3 年 5 月 1 日）
  const warekiMatch = s.match(/(明治|大正|昭和|平成|令和)\s*(元|\d+)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
  if (warekiMatch) {
    const [, era, eraYearRaw, monthStr, dayStr] = warekiMatch;
    const eraYear = eraYearRaw === "元" ? 1 : parseInt(eraYearRaw, 10);
    const gregorianYear = WAREKI_ERA_START[era] + eraYear - 1;
    const d = new Date(gregorianYear, parseInt(monthStr, 10) - 1, parseInt(dayStr, 10));
    if (!isNaN(d)) return d;
  }

  // 西暦を漢字で書いた形式（例：1959年5月22日）
  const kanjiMatch = s.match(/^(\d{3,4})\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
  if (kanjiMatch) {
    const [, yearStr, monthStr, dayStr] = kanjiMatch;
    const d = new Date(parseInt(yearStr, 10), parseInt(monthStr, 10) - 1, parseInt(dayStr, 10));
    if (!isNaN(d)) return d;
  }

  // 西暦（1990-05-01, 1990/05/01 など、Dateがそのまま解釈できる形式）
  const d2 = new Date(s);
  if (!isNaN(d2)) return d2;

  return null;
}

function calcAge(birthDateStr) {
  if (!birthDateStr) return null;
  const b = parseFlexibleDate(birthDateStr);
  if (!b || isNaN(b)) return null;
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
}

// 郵便番号と住所が「560-0041 豊中市…」のように結合されている旧データを表示用に分割する
function splitAddressForDisplay(editing) {
  let postalCode = editing.postalCode || "";
  let address = editing.address || "";
  if (!postalCode) {
    const m = address.match(/^(\d{3}-?\d{4})\s+(.*)$/);
    if (m) { postalCode = m[1]; address = m[2]; }
  }
  return { postalCode, address };
}

async function lookupPostalCode() {
  const zipEl = document.getElementById("emp_postalCode");

  try {
    const res = await fetch(`https://zipcloud.ibsdoc.jp/api/search?zipcode=${raw}`);

    if (data.results && data.results[0]) {
      const r = data.results[0];
      addrEl.value = `${r.address1}${r.address2}${r.address3}`;

}

function computeEmpList() {
  const searchVal = state.empSearchVal || "";
  const areaFilter = state.empAreaFilter || "";
  const showResigned = !!state.showResignedList;
  const sortKey = state.empSortKey || "code";

  const source = state.employees.filter(e => showResigned ? e.status === "resigned" : e.status !== "resigned");
  const matchesSearch = e => {
    if (!searchVal) return true;
    const v = searchVal.toLowerCase();
    const vDigits = searchVal.replace(/[^\d]/g, "");
    const phoneDigits = (e.phone || "").replace(/[^\d]/g, "");
    const phoneMatches = vDigits && phoneDigits.includes(vDigits);
    return phoneMatches || [e.name, e.furigana, e.employeeCode, e.phone, e.workplace].some(f => (f || "").toLowerCase().includes(v));
  };
  let list = source.filter(e => matchesSearch(e) && (!areaFilter || e.area === areaFilter));
  list = list.slice().sort((a, b) => {
    if (sortKey === "name") return (a.name || "").localeCompare(b.name || "", "ja");
    if (sortKey === "age") {
      const ageA = calcAge(a.birthDate), ageB = calcAge(b.birthDate);
      if (ageA === null && ageB === null) return 0;
      if (ageA === null) return 1;
      if (ageB === null) return -1;
      return ageB - ageA; // 年上が先
    }
    return (a.employeeCode || "").localeCompare(b.employeeCode || "", "ja", { numeric: true });
  });
  return list;
}

async function resignEmployee(id) {
  const dateEl = document.getElementById(`resignDate_${id}`);
  const resignedDate = dateEl ? dateEl.value : "";
  if (!resignedDate) return alert("退職日を選んでください");
  if (!confirm(`退職日を ${resignedDate} として、この方を「退職」扱いにします。ログインIDは自動的に無効化され、ログインできなくなります。\nまた、参加しているグループチャットからも自動的に抜けます。よろしいですか？`)) return;
  const emp = state.employees.find(e => e.id === id) || {};
  const data = {
    status: "resigned",
    resignedDate,
    formerLoginId: emp.loginId || "",
    loginId: ""
  };
  if (!firebaseReady) {
    const idx = state.employees.findIndex(e => e.id === id);
    if (idx >= 0) state.employees[idx] = { ...state.employees[idx], ...data };
    return render();
  }
  try {
    await db.collection("employees").doc(id).update(data);
    await removeMemberFromAllGroups(id);
  } catch (e) {
    alert("更新エラー: " + e.message);
  }
}

// 退職・削除された従業員を、参加中のすべてのグループチャットから抜けさせる。
// 抜けた結果メンバーが0人になったグループは、メッセージごと削除する。
async function removeMemberFromAllGroups(employeeId) {
  if (!firebaseReady) return;
  try {
    const snap = await db.collection("groupChats").where("members", "array-contains", employeeId).get();
    for (const doc of snap.docs) {
      const g = doc.data();
      const remaining = (g.members || []).filter(m => m !== employeeId);
      if (remaining.length === 0) {
        await deleteGroupAndMessages(doc.id);
      } else {
        await db.collection("groupChats").doc(doc.id).update({ members: remaining });
      }
    }
  } catch (e) {
    console.error("グループからの自動退出エラー", e);
  }
}

async function deleteGroupAndMessages(groupId) {
  const msgSnap = await db.collection("groupMessages").where("groupId", "==", groupId).get();
  const batch = db.batch();
  msgSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(db.collection("groupChats").doc(groupId));
  await batch.commit();
}

function generateLoginId() {
  const existing = new Set((state.employees || []).map(e => e.loginId).filter(Boolean));
  let id;
  do {

  } while (existing.has(id));
  return id;
}

function handleBulkImportFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let records;
    try {
      records = JSON.parse(reader.result);
      if (!Array.isArray(records)) throw new Error("配列形式ではありません");
    } catch (e) {
      document.getElementById("bulkImportPreview").innerHTML = `<p style="color:var(--danger);">ファイルの読み込みに失敗しました: ${e.message}</p>`;
      return;
    }
    state.bulkImportRecords = records;
    const noPhone = records.filter(r => !r.phone).length;
    document.getElementById("bulkImportPreview").innerHTML = `
      <p style="margin-top:10px;">${records.length}件のデータを読み込みました。${noPhone > 0 ? `（うち電話番号なし: ${noPhone}件）` : ""}</p>
      <button class="primary" onclick="runBulkImport()">この内容で登録する</button>
    `;
  };
  reader.readAsText(file);
}

async function runBulkImport() {
  const records = state.bulkImportRecords || [];
  if (!records.length) return;
  document.getElementById("bulkImportPreview").innerHTML = `<p>登録中です…しばらくお待ちください</p>`;

  if (!firebaseReady) {
    records.forEach(r => state.employees.push({ id: "demo-" + Math.random(), ...r }));
    state.showBulkImport = false;
    state.bulkImportRecords = null;
    alert("（お試し表示のため実際の保存はされません）");
    return render();
  }

  try {
    const batch = db.batch();
    records.forEach(r => {
      const ref = r.loginId ? db.collection("employees").doc(r.loginId) : db.collection("employees").doc();
      batch.set(ref, r, { merge: true });
    });
    await batch.commit();
    state.showBulkImport = false;
    state.bulkImportRecords = null;
    alert(`${records.length}件、登録できました！`);
    render();
  } catch (e) {
    alert("登録エラー: " + e.message);
  }
}

function toWareki(dateStr) {
  if (!dateStr) return "";
  const d = parseFlexibleDate(dateStr);
  if (!d) return dateStr;
  const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
  let era, ey;
  if (y >= 2019 && !(y === 2019 && (m < 5))) { era = "令和"; ey = y - 2018; }
  else if (y >= 1989) { era = "平成"; ey = y - 1988; }
  else if (y >= 1926) { era = "昭和"; ey = y - 1925; }
  else { return dateStr; }
  if (ey === 1) ey = "元";
  return `${era}　${ey}年　${m}月　${day}日`;
}
function addMonths(dateStr, months) {
  const d = parseFlexibleDate(dateStr) || new Date();
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
}
function addDays(dateStr, days) {
  const d = parseFlexibleDate(dateStr) || new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

/* ---------- 給与明細（PDFアップロード／ダウンロード） ---------- */
function arrayBufferToBase64Pdf(bytes) {
  let binary = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return "data:application/pdf;base64," + btoa(binary);
}

async function extractPageTexts(file) {
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const texts = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      texts.push(content.items.map(it => it.str).join(" "));
    }
    return texts;
  } catch (e) {
    console.error("PDF文字読み取りエラー", e);
    return [];
  }
}

function guessEmployeeIdFromText(text, employees) {
  if (!text) return "";
  for (const e of employees) {
    if (e.employeeCode && text.includes(e.employeeCode)) return e.id;
  }
  return "";
}

async function handleBulkPayslipFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const isOxps = /\.oxps$/i.test(file.name);
  if (isOxps) return handleBulkPayslipOxps(file, evt);
  if (file.type !== "application/pdf") { alert("PDFまたはOXPSファイルを選んでください"); evt.target.value = ""; return; }

  document.getElementById("bulkPayslipArea").innerHTML = `<p class="muted">読み込み中です…（管理番号を自動で読み取っています）しばらくお待ちください</p>`;
  try {
    const pageTexts = await extractPageTexts(file);

    const arrayBuffer = await file.arrayBuffer();
    const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
    const pageCount = srcDoc.getPageCount();

    const activeSorted = state.employees
      .filter(e => e.status !== "resigned")
      .slice()
      .sort((a, b) => (a.employeeCode || "").localeCompare(b.employeeCode || "", "ja", { numeric: true }));

    const pages = [];
    for (let i = 0; i < pageCount; i++) {
      const newDoc = await PDFLib.PDFDocument.create();
      const [copiedPage] = await newDoc.copyPages(srcDoc, [i]);
      newDoc.addPage(copiedPage);
      const bytes = await newDoc.save();
      const matchedId = guessEmployeeIdFromText(pageTexts[i], state.employees);
      pages.push({
        pageIndex: i,
        base64: arrayBufferToBase64Pdf(bytes),
        sizeKB: Math.round(bytes.length / 1024),
        employeeId: matchedId || (activeSorted[i] && activeSorted[i].id) || "",
        matchedByCode: !!matchedId
      });
    }
    state.bulkPayslipPages = pages;
    document.getElementById("bulkPayslipArea").innerHTML = renderBulkPayslipAssignList();
  } catch (e) {
    document.getElementById("bulkPayslipArea").innerHTML = `<p style="color:var(--danger);">PDFの読み込みに失敗しました: ${e.message}</p>`;
  }
}

  "非課税通勤費", "休日勤務手当"
]);
const PS_KOJO_LABELS = new Set([
  "健康保険料", "厚生年金保険", "雇用保険料", "年末調整還付", "年末調整徴収",
  "(定額減税額)", "(減税前税額)"
]);
const PS_AMBIGUOUS_LABELS = new Set(["前月修正", "立替", "立替金"]);
const PS_ATTEND_LABELS = new Set(["所定", "出勤", "休日", "実働", "有休", "欠勤"]);

function psParseGlyphRuns(xml) {
  const re = /<Glyphs[^>]*OriginX="([\d.]+)"[^>]*OriginY="([\d.]+)"[^>]*Indices="([^"]*)"[^>]*UnicodeString="([^"]*)"/g;
  const runs = [];
  let m;
  while ((m = re.exec(xml)) !== null) {
    runs.push({ x: parseFloat(m[1]), y: parseFloat(m[2]), indices: m[3], text: m[4] });
  }
  return runs;
}

// 結合された数値ラン（例："249,00023,9901,11025,100223,900"）を、
// 弥生のOXPS出力ではフィールドの区切り位置の文字だけIndices内にアドバンス幅の上書き（カンマ区切りの2値目）
// が入っているため、それを目印に分割する。
function psSplitCombinedNumberRun(run) {
  const tokens = run.indices.split(";");
  const text = run.text;
  if (tokens.length !== text.length) return [text];
  const parts = [];
  let cur = "";
  for (let i = 0; i < tokens.length; i++) {
    cur += text[i];
    if (tokens[i].includes(",") && i !== tokens.length - 1) { parts.push(cur); cur = ""; }
  }
  if (cur) parts.push(cur);
  return parts;
}

function psToNumber(s) {
  if (s == null) return 0;
  const n = String(s).replace(/,/g, "").replace(/[△▲]/, "-").trim();
  const v = parseFloat(n);
  return isNaN(v) ? 0 : v;
}

function psWarekiToMonth(str) {
  const m = str.match(/令和\s*(\d+)年\s*(\d+)月分/);
  if (!m) return "";
  const year = 2018 + parseInt(m[1], 10);
  const month = String(parseInt(m[2], 10)).padStart(2, "0");
  return `${year}-${month}`;
}

function psParseOnePage(xml) {
  const allRuns = psParseGlyphRuns(xml);
  // 1ページに「正」「副」の2部（同一内容）が上下に印字されているため、上半分のみを使う
  const runs = allRuns.filter(r => r.y < 558).sort((a, b) => (Math.round(a.y / 5) - Math.round(b.y / 5)) || (a.x - b.x));

  const rec = {
    code: "", name: "", branch: "", month: "",
    attendance: {}, kyuyo: [], kojo: [],
    kyuyoGokei: 0, shakaihokenGokei: 0, shotokuzei: 0, kojoGokei: 0,
    sashihikiShikyu: 0, furikomiShikyu: 0, genkinShikyu: 0
  };

  for (let i = 0; i < runs.length; i++) {
    const r = runs[i];
    const next = runs[i + 1];

    if (r.text === "番号" && next) { rec.code = next.text.trim(); continue; }

    if (r.text.startsWith("氏名") && r.text.includes("令和")) {
      const nameMatch = r.text.match(/^氏名(.+?)殿組織(.*?)令和/);
      if (nameMatch) { rec.name = nameMatch[1]; rec.branch = nameMatch[2] || ""; }
      rec.month = psWarekiToMonth(r.text);
      continue;
    }

    if (PS_ATTEND_LABELS.has(r.text) && next && r.y >= 85 && r.y <= 160) {
      rec.attendance[r.text] = next.text.trim();
      continue;
    }

    if (r.text === "支給合計社会保険料計所得税控除合計") continue;

    if (r.y > 415 && r.y < 435 && /^[\d,]+$/.test(r.text) && r.indices.split(";").length === r.text.length) {
      const parts = psSplitCombinedNumberRun(r);
      if (parts.length === 5) {
        rec.kyuyoGokei = psToNumber(parts[0]);
        rec.shakaihokenGokei = psToNumber(parts[1]);
        rec.shotokuzei = psToNumber(parts[2]);
        rec.kojoGokei = psToNumber(parts[3]);
        rec.sashihikiShikyu = psToNumber(parts[4]);
      }
      continue;
    }

    if (r.y > 465 && r.y < 485 && r.x > 650 && /^[\d,]+$/.test(r.text)) { rec.furikomiShikyu = psToNumber(r.text); continue; }
    if (r.y > 515 && r.y < 530 && r.x > 650 && /^[\d,]+$/.test(r.text)) { rec.genkinShikyu = psToNumber(r.text); continue; }

    if (r.y >= 180 && r.y <= 365 && next &&
        (PS_KYUYO_LABELS.has(r.text) || PS_KOJO_LABELS.has(r.text) || PS_AMBIGUOUS_LABELS.has(r.text))) {
      const amount = psToNumber(next.text);
      if (PS_KYUYO_LABELS.has(r.text) || (PS_AMBIGUOUS_LABELS.has(r.text) && r.x < 430)) {
        rec.kyuyo.push({ label: r.text, amount });
      } else {
        rec.kojo.push({ label: r.text, amount });
      }
      i++;
      continue;
    }
  }
  return rec;
}

function psNaturalSort(a, b) {
  const na = parseInt(a.match(/(\d+)/)[1], 10);
  const nb = parseInt(b.match(/(\d+)/)[1], 10);
  return na - nb;
}

async function handleBulkPayslipOxps(file, evt) {
  document.getElementById("bulkPayslipArea").innerHTML = `<p class="muted">読み込み中です…（OXPSファイルを解析し、金額を読み取っています）しばらくお待ちください</p>`;
  try {
    const buf = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    const pageFiles = Object.keys(zip.files)
      .filter(p => /^Documents\/1\/Pages\/\d+\.fpage$/.test(p))
      .sort(psNaturalSort);
    if (!pageFiles.length) throw new Error("ページが見つかりませんでした（OXPSの形式をご確認ください）");

    const records = [];
    for (const pf of pageFiles) {
      const xml = await zip.file(pf).async("string");
      const rec = psParseOnePage(xml);
      records.push(rec);
    }

    // 従業員マッチング（管理番号優先、見つからなければ氏名）
    records.forEach(rec => {
      let emp = state.employees.find(e => e.employeeCode && e.employeeCode === rec.code);
      if (!emp) emp = state.employees.find(e => e.name && e.name === rec.name);
      rec.employeeId = emp ? emp.id : "";
      rec.matched = !!emp;
      rec.noWorkplace = emp ? !emp.workplace : false;
      // 検算：弥生自身が計算した合計欄どうしの整合性のみを確認する
      // （支給・控除の内訳項目は弥生台紙表示用であり、内訳の合算とは一致しないことがあるため検算には使わない）
      rec.reconcileOk =
        (rec.kyuyoGokei - rec.kojoGokei) === rec.sashihikiShikyu &&
        (rec.furikomiShikyu + rec.genkinShikyu) === rec.sashihikiShikyu;
    });

    state.bulkOxpsRecords = records;
    state.bulkOxpsMonth = records[0] && records[0].month || state.payslipMonth || new Date().toISOString().slice(0, 7);
    document.getElementById("bulkPayslipArea").innerHTML = renderBulkOxpsReview();
  } catch (e) {
    document.getElementById("bulkPayslipArea").innerHTML = `<p style="color:var(--danger);">OXPSの読み込みに失敗しました: ${e.message}</p>`;
  } finally {
    if (evt) evt.target.value = "";
  }
}

      </div>
      ${unmatchedCount ? `<div class="payslip-warning">従業員に一致しなかった方が${unmatchedCount}名います。お試しモードのため従業員データが少ないと、この件数が多く出ます（実際のFirebase環境では管理番号でご登録の従業員と自動照合されます）。下の一覧から手動で割り当てることもできます。</div>` : ""}
      ${ngCount ? `<div class="payslip-warning">検算に一致しない明細が${ngCount}名分あります。金額が正しく読み取れていない可能性があるため、対象月を確認し、必要であれば元のOXPSファイルをご確認ください。</div>` : ""}
      <p class="muted" style="margin:0 0 8px;">対象月：
        <select onchange="state.bulkOxpsMonth=this.value;">
          ${[state.bulkOxpsMonth].concat(records.map(r=>r.month)).filter((v,i,a)=>v && a.indexOf(v)===i).map(m => `<option value="${m}" ${m===month?"selected":""}>${m}</option>`).join("")}

      </p>
      <table>
        <thead><tr><th>管理番号</th><th>氏名</th><th>組織</th><th>差引支給額</th><th>状態</th><th>割り当てる従業員</th><th></th></tr></thead>
        <tbody>
          ${records.map((r, i) => `
            <tr>
              <td>${r.code}</td>

              <td style="text-align:right;">${r.sashihikiShikyu.toLocaleString()}円</td>

                ${r.reconcileOk ? "" : `<span class="status-pill" style="background:#FEE2E2;color:var(--danger);">検算NG</span>`}
              </td>
              <td>
                <select onchange="state.bulkOxpsRecords[${i}].employeeId=this.value; state.bulkOxpsRecords[${i}].matched=!!this.value;">
                  <option value="">選ばない</option>

                </select>

/* 給与明細：36か月より古いものは表示せず、管理者側で自動的に削除する */
function payslipCutoffMonth() {
  const d = new Date();
  d.setMonth(d.getMonth() - 36);
  return d.toISOString().slice(0, 7); // "YYYY-MM"
}
function filterRecentPayslips(list) {
  const cutoff = payslipCutoffMonth();
  return (list || []).filter(p => !p.month || p.month >= cutoff);
}
async function cleanupOldPayslips(allPayslips) {
  if (!firebaseReady) return;
  const cutoff = payslipCutoffMonth();
  const old = (allPayslips || []).filter(p => p.month && p.month < cutoff);
  if (!old.length) return;
  try {
    const batch = db.batch();
    old.forEach(p => batch.delete(db.collection("payslips").doc(p.id)));
    await batch.commit();
    console.log(`36か月より古い給与明細を${old.length}件、自動削除しました`);
  } catch (e) {
    console.error("古い給与明細の自動削除エラー", e);
  }
}

function handlePayslipFileSelect(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (file.type !== "application/pdf") {
    alert("PDFファイルを選んでください");
    evt.target.value = "";
    return;
  }
  if (file.size > 650 * 1024) {
    alert("ファイルが大きすぎます（650KBまで）。弥生給与の出力設定で、白黒・低解像度などにして小さくしてから再度お試しください。");
    evt.target.value = "";
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    state.pendingPayslip = { base64: reader.result, fileName: file.name };
    document.getElementById("payslipUploadPreview").innerHTML = `
      <p style="margin-top:10px;">「${file.name}」を読み込みました。</p>
      <button class="primary" onclick="uploadPayslip()">この内容でアップロードする</button>
    `;
  };
  reader.readAsDataURL(file);
}

async function uploadPayslip() {
  const empId = state.payslipEmpId || (state.employees[0] && state.employees[0].id);
  const emp = state.employees.find(e => e.id === empId) || {};
  const month = (document.getElementById("payslipMonth") || {}).value || state.payslipMonth;
  if (!empId || !month || !state.pendingPayslip) return alert("従業員・対象月・ファイルをご確認ください");

  const data = {
    employeeId: empId,
    employeeName: emp.name || "",
    month,
    fileName: state.pendingPayslip.fileName,
    pdfBase64: state.pendingPayslip.base64,
    uploadedAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };
  const docId = empId + "_" + month;

  if (!firebaseReady) {
    state.payslips = state.payslips || [];
    const idx = state.payslips.findIndex(p => p.id === docId);
    if (idx >= 0) state.payslips[idx] = { id: docId, ...data };
    else state.payslips.push({ id: docId, ...data });
    state.pendingPayslip = null;
    alert("（お試し表示のため実際の保存はされません）");
    return render();
  }
  try {
    await db.collection("payslips").doc(docId).set(data);
    state.pendingPayslip = null;
    alert("アップロードしました");
    render();
  } catch (e) {
    alert("アップロードエラー: " + e.message);
  }
}

async function deletePayslip(id) {
  if (!confirm("この給与明細を削除します。よろしいですか？")) return;
  if (!firebaseReady) {
    state.payslips = (state.payslips || []).filter(p => p.id !== id);
    return render();
  }
  try {
    await db.collection("payslips").doc(id).delete();
  } catch (e) {
    alert("削除エラー: " + e.message);
  }
}

/* PDF保存（iOSの印刷機能を経由しないため、印刷時のURL帯が付かない） */
async function savePreviewAsPdf(elementId, filename, btnEl) {
  const el = document.getElementById(elementId);
  if (!el) return alert("保存する内容が見つかりません");
  const originalLabel = btnEl ? btnEl.textContent : "";
  if (btnEl) { btnEl.textContent = "PDFを作成中…"; btnEl.disabled = true; }
  // 画面表示用の「カード」の余白・角丸・枠線は、印刷物としては不要なので、
  // キャプチャの間だけ一時的に外す（印刷時のCSSと同じ見た目に揃えるため）
  const prevStyle = { padding: el.style.padding, border: el.style.border, borderRadius: el.style.borderRadius, boxShadow: el.style.boxShadow, margin: el.style.margin };
  el.style.padding = "0";
  el.style.border = "none";
  el.style.borderRadius = "0";
  el.style.boxShadow = "none";
  el.style.margin = "0";

  // 労働者名簿は1枚に収まる短い書類なので、印刷時と同じく文字・余白を大きくする
  const isRoster = el.classList.contains("roster-print");
  const restoreFns = [];
  const bumpStyle = (node, prop, value) => {
    const prev = node.style[prop];
    node.style[prop] = value;
    restoreFns.push(() => { node.style[prop] = prev; });
  };
  if (isRoster) {
    bumpStyle(el, "fontSize", "16px");
    el.querySelectorAll("td").forEach(td => bumpStyle(td, "padding", "14px 18px"));
    el.querySelectorAll(".rm-flex-pad").forEach(d => bumpStyle(d, "padding", "14px 18px"));
    const title = el.querySelector("p:first-child");
    if (title) { bumpStyle(title, "fontSize", "26px"); bumpStyle(title, "marginBottom", "28px"); bumpStyle(title, "letterSpacing", "14px"); }
    const footer = el.querySelector(".rm-footer");
    if (footer) bumpStyle(footer, "fontSize", "15px");
  }
  // 印刷したときに罫線や薄い背景色が飛んでしまわないよう、キャプチャ時は濃くしておく
  if (el.classList.contains("contract-preview")) {
    el.querySelectorAll("table, td").forEach(node => { bumpStyle(node, "borderColor", "#4A4238"); bumpStyle(node, "borderWidth", "1.5px"); });
    el.querySelectorAll(".c-label, .rm-flex-pad:first-child").forEach(node => bumpStyle(node, "background", "#E4CFA0"));
    el.querySelectorAll("td, p").forEach(node => { bumpStyle(node, "color", "#1a1613"); });
  }

  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
    const pageW = 595.28, pageH = 841.89; // A4（pt）
    const pageAspect = pageH / pageW;
    const pxPerPage = Math.floor(canvas.width * pageAspect);
    const totalPages = Math.max(1, Math.ceil(canvas.height / pxPerPage));

    const pdfDoc = await PDFLib.PDFDocument.create();
    let y = 0;
    while (y < canvas.height) {
      const sliceH = Math.min(pxPerPage, canvas.height - y);
      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, sliceH);
      ctx.drawImage(canvas, 0, y, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      const imgData = sliceCanvas.toDataURL("image/png");
      const imgBytes = Uint8Array.from(atob(imgData.split(",")[1]), c => c.charCodeAt(0));
      const png = await pdfDoc.embedPng(imgBytes);
      const page = pdfDoc.addPage([pageW, pageH]);
      const drawH = pageW * (sliceH / canvas.width);
      // 1枚に収まる短い書類（労働者名簿など）は、上に詰めず縦方向の中央に配置する
      const yPos = totalPages === 1 ? (pageH - drawH) / 2 : pageH - drawH;
      page.drawImage(png, { x: 0, y: yPos, width: pageW, height: drawH });
      y += sliceH;
    }
    const bytes = await pdfDoc.save();
    const blob = new Blob([bytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (e) {
    alert("PDFの作成に失敗しました: " + e.message);
  } finally {
    el.style.padding = prevStyle.padding;
    el.style.border = prevStyle.border;
    el.style.borderRadius = prevStyle.borderRadius;
    el.style.boxShadow = prevStyle.boxShadow;
    el.style.margin = prevStyle.margin;
    restoreFns.forEach(fn => fn());
    if (btnEl) { btnEl.textContent = originalLabel; btnEl.disabled = false; }
  }
}

/* ---------- 封筒印刷の設定を保存する（本社共有・次回から自動で同じ位置に印刷） ---------- */
const ENVELOPE_SETTINGS_LOCAL_KEY = "assistRoumuEnvelopeSettings";

function subscribeEnvelopeSettings() {
  if (!firebaseReady) {
    try {
      const raw = localStorage.getItem(ENVELOPE_SETTINGS_LOCAL_KEY);
      if (raw) applyEnvelopeSettings(JSON.parse(raw));
    } catch (e) { /* 読み込めない場合は初期値のまま */ }
    return;
  }
  db.collection("settings").doc("envelope").onSnapshot(doc => {
    if (doc.exists) applyEnvelopeSettings(doc.data());
  }, err => console.error("封筒設定の読み込みエラー", err));
}

function applyEnvelopeSettings(d) {
  if (!d) return;
  if (d.envelopeOffset) state.envelopeOffset = d.envelopeOffset;
  if (d.envelopeOffsetH) state.envelopeOffsetH = d.envelopeOffsetH;
  if (d.envelopeShowBoxes != null) state.envelopeShowBoxes = d.envelopeShowBoxes;
  if (d.envelopeMode) state.envelopeMode = d.envelopeMode;
  // 封筒印刷タブを表示中は、画面全体(＝「位置の微調整」パネルを含む)を作り直さない。
  // プレビューの絵だけを更新することで、パネルが開いたまま数値調整を続けられるようにする。
  if (state.adminTab === "envelope") refreshEnvelopeSheet();
}

function saveEnvelopeSettings() {
  const data = {
    envelopeOffset: state.envelopeOffset,
    envelopeOffsetH: state.envelopeOffsetH,
    envelopeShowBoxes: !!state.envelopeShowBoxes,
    envelopeMode: state.envelopeMode || "vertical"
  };

    return;
  }
  db.collection("settings").doc("envelope").set(data, { merge: true })

}

function computeEnvelopeEmpOptions() {
  const empId = state.envelopeEmpId || (state.employees[0] && state.employees[0].id);
  const q = (state.envelopeEmpSearchVal || "").toLowerCase();
  const filtered = !q ? state.employees : state.employees.filter(e =>
    [e.name, e.furigana, e.employeeCode].some(f => (f || "").toLowerCase().includes(q))
  );
  return filtered.map(e => `<option value="${e.id}" ${e.id === empId ? "selected" : ""}>${e.name || e.id}</option>`).join("")
    || `<option value="">該当する従業員がいません</option>`;
}

function handleEnvelopeSearchInput(el) {
  if (el.dataset.composing === "1") return;
  state.envelopeEmpSearchVal = el.value;
  const sel = document.getElementById("envelopeEmpSelect");
  if (sel) sel.innerHTML = computeEnvelopeEmpOptions();
  if (sel) state.envelopeEmpId = sel.value;
  refreshEnvelopeSheet();
}

function refreshEnvelopeSheet() {
  const sheet = document.getElementById("envelopeSheet");
  if (!sheet) return;
  const empId = state.envelopeEmpId || (state.employees[0] && state.employees[0].id);
  const emp = state.employees.find(e => e.id === empId) || {};
  sheet.innerHTML = renderEnvelopeSheet(emp);
}

function buildZipBoxesHtml(emp, zipGap, showBoxes, zipFontSize) {
  const zip = (emp.postalCode || "").replace(/[^\d]/g, "");
  const zipDigits = zip ? zip.split("") : ["", "", "", "", "", "", ""];
  const boxStyle = showBoxes ? "border:0.5mm solid #E6001A; border-radius:0.5mm; box-sizing:border-box;" : "";
  const scale = (zipFontSize || 14) / 14;
  const boxW = (5.5 * scale).toFixed(2);
  const boxH = (7 * scale).toFixed(2);
  const hyphenW = (3 * scale).toFixed(2);
  const digitBox = (d) => `<span style="display:inline-flex; align-items:center; justify-content:center; width:${boxW}mm; height:${boxH}mm; font-weight:800; ${boxStyle}">${d}</span>`;
  const gap = (mm) => `<span style="display:inline-block; width:${mm}mm;"></span>`;
  return zipDigits.map((d, i) => {
    let html = digitBox(d);
    if (i === 2) html += gap(zipGap) + `<span style="display:inline-flex; align-items:center; justify-content:center; width:${hyphenW}mm; ${showBoxes ? "color:#E6001A; font-weight:700;" : ""}">-</span>` + gap(zipGap);
    else if (i < 6) html += gap(zipGap);
    return html;
  }).join("");
}

function renderEnvelopeSheet(emp) {
  const showBoxes = !!state.envelopeShowBoxes;
  const mode = state.envelopeMode || "vertical";
  const FONT = "'Yu Gothic','Hiragino Kaku Gothic ProN','Noto Sans CJK JP','Noto Serif CJK JP',sans-serif";

  if (mode === "horizontal") {
    const offH = state.envelopeOffsetH || { zipTop: 35, zipLeft: 30, zipGap: 2, zipFontSize: 14, addrTop: 100, addrLeft: 32, fontSize: 18, nameFontSize: 28 };
    const zipFontSizeH = offH.zipFontSize || 14;
    const zipBoxes = buildZipBoxesHtml(emp, offH.zipGap, showBoxes, zipFontSizeH);
    return `
      <div class="envelope-zip" style="position:absolute; top:${offH.zipTop}mm; left:${offH.zipLeft}mm; font-size:${zipFontSizeH}pt; font-family:${FONT}; letter-spacing:0; white-space:nowrap;">
        ${zipBoxes}
      </div>
      <div class="envelope-addr" style="position:absolute; top:${offH.addrTop}mm; left:${offH.addrLeft}mm; font-family:${FONT};">
        <p style="font-size:${offH.fontSize}pt; margin:0; line-height:1.7;">${emp.address || ""}</p>
        <p style="font-size:${offH.nameFontSize}pt; margin:0; margin-block-start:6mm; font-weight:700; line-height:1.7;">${emp.name || ""}　様</p>
      </div>
    `;
  }

  // 長形3号・縦書き：writing-modeはブラウザ/プリンタによって印刷結果が化けることがあるため、
  // 横書きのテキストを90度回転させることで「縦に寝かせる」方式にしている（印刷の再現性が高い）。
  // 封筒の横幅は120mmなので、right指定と同じ感覚で使えるよう left = 120mm - 右からの位置 に変換している。
  const off = state.envelopeOffset || { top: 12, right: 8, nameTop: 30, nameRight: 62, fontSize: 15, nameFontSize: 22, zipGap: 1.5, nameColGap: 13, zipFontSize: 14 };
  const zipFontSizeV = off.zipFontSize || 14;
  const zipBoxes = buildZipBoxesHtml(emp, off.zipGap, showBoxes, zipFontSizeV);
  const colGap = off.nameColGap != null ? off.nameColGap : 13;
  return `
    <div class="envelope-zip" style="position:absolute; top:${off.top}mm; right:${off.right}mm; font-size:${zipFontSizeV}pt; font-family:${FONT}; letter-spacing:0; white-space:nowrap;">
      ${zipBoxes}
    </div>
    <div style="position:absolute; top:${off.nameTop}mm; left:calc(120mm - ${off.nameRight}mm); transform:rotate(90deg); transform-origin:top left; white-space:nowrap; font-family:${FONT};">
      <p style="font-size:${off.fontSize}pt; margin:0;">${emp.address || ""}</p>
    </div>
    <div style="position:absolute; top:${off.nameTop}mm; left:calc(120mm - ${off.nameRight}mm - ${colGap}mm); transform:rotate(90deg); transform-origin:top left; white-space:nowrap; font-family:${FONT};">
      <p style="font-size:${off.nameFontSize}pt; margin:0; font-weight:700;">${emp.name || ""}　様</p>
    </div>
  `;
}

function digitBoxes(value, count) {
  const chars = (value || "").toString().replace(/[^\d]/g, "").split("");
  let html = '<span style="display:inline-flex; gap:3px; vertical-align:middle;">';
  for (let i = 0; i < count; i++) {
    html += `<span style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:26px; border:1px solid var(--border); border-radius:2px; font-size:13px; font-weight:600;">${chars[i] || ""}</span>`;
  }
  html += "</span>";
  return html;
}

async function updateLeaveStatus(id, status) {
  if (!firebaseReady) {
    const r = state.leaveRequests.find(x => x.id === id);
    if (r) r.status = status;
    return render();
  }
  try {
    await db.collection("leaveRequests").doc(id).update({ status });
  } catch (e) {
    alert("更新エラー: " + e.message);
  }
}

function subscribeAllLeaveRequests() {
  db.collection("leaveRequests").orderBy("createdAt", "desc").onSnapshot(snap => {
    state.leaveRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("employees").onSnapshot(snap => {
    state.employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
    state.orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("payslips").onSnapshot(snap => {
    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    state.payslips = rows;
    render();
    cleanupOldPayslips(rows);
  }, err => console.error("payslips(admin)購読エラー", err));
}

function subscribeAllMessages() {
  db.collection("messages").onSnapshot(snap => {
    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    rows.sort((a, b) => {
      const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
      const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
      return ta - tb;
    });
    state.messages = rows;
    render();
  }, err => console.error("messages(admin)購読エラー", err));
}

// 本社側は「グループが存在すること・メンバー数」だけ確認できる（groupMessagesは購読しない＝トーク内容は見えない）
function subscribeAllGroups() {
  db.collection("groupChats").onSnapshot(snap => {
    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    rows.sort((a, b) => {
      const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
      const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
      return tb - ta;
    });
    state.allGroups = rows;
    render();
  }, err => console.error("groupChats(admin)購読エラー", err));
}

async function adminDeleteGroup(groupId, name) {
  if (!confirm(`「${name}」を削除します。このグループのメッセージもすべて削除され、元に戻せません。よろしいですか？`)) return;
  if (!firebaseReady) {
    state.allGroups = (state.allGroups || []).filter(g => g.id !== groupId);
    return render();
  }
  try {
    await deleteGroupAndMessages(groupId);
  } catch (e) {
    alert("削除エラー: " + e.message);
  }
}

function adminUnreadCount() {
  if (!state.messages) return 0;
  return state.messages.filter(m => m.senderRole === "staff" && !m.readByOffice).length;
}

function renderAdminChatTab() {
  const allEmployees = state.employees || [];
  const msgs = state.messages || [];
  const showResigned = !!state.chatShowResigned;
  const employees = allEmployees.filter(e => showResigned ? e.status === "resigned" : e.status !== "resigned");
  const resignedCount = allEmployees.filter(e => e.status === "resigned").length;

  const lastActivityFor = (empId) => {
    const own = msgs.filter(m => m.employeeId === empId);
    if (!own.length) return 0;
    return Math.max(...own.map(m => (m.createdAt && m.createdAt.seconds) ? m.createdAt.seconds : 0));
  };
  const sortedEmployees = employees.slice().sort((a, b) => lastActivityFor(b.id) - lastActivityFor(a.id));

  // スマホ幅では「一覧」か「会話」のどちらか片方だけを表示する（両方常に表示すると、一覧を全部スクロールしないと会話に辿り着けなくなるため）
  const isNarrow = window.innerWidth <= 700;
  const hasOpenedThread = !!state.chatEmployeeId;
  const selectedId = state.chatEmployeeId || (!isNarrow && sortedEmployees[0] && sortedEmployees[0].id);
  const thread = msgs.filter(m => m.employeeId === selectedId && !m.broadcastId);
  const broadcasts = groupBroadcasts(msgs);
  const areas = [...new Set(allEmployees.map(e => e.area).filter(Boolean))];

  const unreadFor = (empId) => msgs.filter(m => m.employeeId === empId && m.senderRole === "staff" && !m.readByOffice).length;

  const listPanel = `
    <div>
      <div class="row-between" style="margin-bottom:8px;">
        <p class="muted" style="margin:0;">${showResigned ? "退職者一覧" : "従業員一覧（更新順）"}</p>
      </div>
      <button style="width:100%; font-size:12px; padding:7px; margin-bottom:10px;" onclick="state.chatShowResigned=!state.chatShowResigned; state.chatEmployeeId=null; render();">
        ${showResigned ? "在籍者に戻る" : `退職者とのやりとりを見る（${resignedCount}）`}
      </button>
      ${sortedEmployees.map(e => `
        <div class="chat-thread-item ${e.id === selectedId ? "active" : ""}" onclick="openAdminThread('${e.id}')">
          <div class="row-between" style="margin:0;">
            <span>${e.name || "(名前未登録)"}</span>
            ${unreadFor(e.id) > 0 ? `<span class="chat-badge" style="position:static;">${unreadFor(e.id)}</span>` : ""}
          </div>
          <div class="muted" style="font-size:12px;">${e.area || ""}</div>
        </div>
      `).join("") || `<p class="muted">${showResigned ? "退職者はいません" : "従業員データがまだありません"}</p>`}
    </div>
  `;

  const threadPanel = `
    <div>
      ${isNarrow ? `<button class="link" style="margin-bottom:8px;" onclick="state.chatEmployeeId=null; render();">← 従業員一覧にもどる</button>` : ""}
      ${selectedId ? `
        <p class="staff-title" style="font-size:16px; margin:0 0 8px;">${(allEmployees.find(e => e.id === selectedId) || {}).name || ""} さんとのやりとり${showResigned ? "（退職済み）" : ""}</p>
        <div class="chat-scroll" id="chatScroll" style="height:60vh;">
          ${thread.length ? thread.map(m => renderChatBubble(m, m.senderRole === "office")).join("") : `<p class="muted">まだメッセージはありません</p>`}
        </div>
        <div class="preset-row">
          ${PRESET_PHRASES_OFFICE.map(p => `<button type="button" class="preset-btn" onclick="insertPreset('${p}')">${p}</button>`).join("")}
        </div>
        ${state.pendingPhoto ? `
          <div class="chat-photo-preview">
            <img src="${state.pendingPhoto.base64}" />
            <span>写真を1枚 添付中</span>
            <button type="button" class="link" onclick="clearPendingPhoto()">やめる</button>
          </div>
        ` : ""}
        <div class="chat-compose">
          <input type="file" accept="image/*" id="chatPhotoInput" style="display:none;" onchange="handlePhotoSelect(event)" />
          <button type="button" class="chat-photo-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
          <textarea id="chatTextInput" placeholder="メッセージを入力"></textarea>
          <button class="primary chat-send-btn" onclick="sendAdminMessage('${selectedId}')">送信</button>
        </div>
      ` : `<p class="muted">左の一覧から従業員を選んでください</p>`}
    </div>
  `;

  const chatGridInner = isNarrow
    ? (hasOpenedThread ? threadPanel : listPanel)
    : `${listPanel}${threadPanel}`;

  return `
    <div class="card admin-chat-grid" style="display:grid; grid-template-columns:220px 1fr; gap:16px;">
      ${chatGridInner}
    </div>

    <div class="card">
      <p class="staff-title" style="font-size:16px;">お知らせを送る（全員／エリア宛て）</p>
      <div class="broadcast-grid" style="display:grid; grid-template-columns:1fr 2fr auto; gap:10px; align-items:end;">
        <div>
          <label>宛先</label>
          <select id="broadcastTarget">
            <option value="all">全員</option>
            ${areas.map(a => `<option value="area:${a}">${a}のみ</option>`).join("")}
          </select>
        </div>
        <div>
          <label>お知らせ内容</label>
          <input id="broadcastText" type="text" placeholder="例：明日は台風のため休業します" />
        </div>
        <button class="primary" style="height:46px;" onclick="sendBroadcast()">送信</button>
      </div>

      ${broadcasts.length ? `
        <div style="margin-top:16px;">
          <p class="muted" style="margin:0 0 8px;">送信したお知らせ</p>
          ${broadcasts.map(b => `
            <div class="row-between" style="margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:8px;">
              <div>
                <div>${escapeHtml(b.text)}</div>
                <span class="muted" style="font-size:12px;">${b.targetLabel}</span>
              </div>
              <span class="muted" style="font-size:13px;">既読 ${b.readCount}/${b.total}</span>
            </div>
          `).join("")}
        </div>
      ` : ""}
    </div>

    <div class="card">
      <p class="staff-title" style="font-size:16px;">グループチャット一覧（本社確認用）</p>
      <p class="muted" style="font-size:12px; margin-top:-6px;">従業員同士の「みんなとお話し」グループの一覧です。トーク内容は本社側からは見えません。存在するグループの確認と、削除だけができます。</p>
      <table>
        <thead><tr><th>グループ名</th><th>参加コード</th><th>人数</th><th>作成日</th><th></th></tr></thead>
        <tbody>
          ${(state.allGroups || []).map(g => `
            <tr>
              <td>${escapeHtml(g.name || "")}</td>
              <td>${g.code || ""}</td>
              <td>${(g.members || []).length}人</td>
              <td class="muted" style="font-size:12px;">${g.createdAt && g.createdAt.seconds ? new Date(g.createdAt.seconds * 1000).toLocaleDateString("ja-JP") : ""}</td>
              <td><button style="font-size:12px; padding:6px 10px; color:var(--danger); border-color:var(--danger);" onclick="adminDeleteGroup('${g.id}', '${(g.name || "").replace(/'/g, "\\'")}')">削除</button></td>
            </tr>
          `).join("") || `<tr><td colspan="5" class="muted">グループチャットはまだありません</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function groupBroadcasts(msgs) {
  const map = {};
  msgs.filter(m => m.broadcastId).forEach(m => {
    if (!map[m.broadcastId]) map[m.broadcastId] = { text: m.text, targetLabel: m.targetLabel || "全員", items: [] };
    map[m.broadcastId].items.push(m);
  });
  return Object.values(map).map(b => ({
    text: b.text,
    targetLabel: b.targetLabel,
    total: b.items.length,
    readCount: b.items.filter(i => i.readByStaff).length
  }));
}

function openAdminThread(empId) {
  state.chatEmployeeId = empId;
  render();
  markOfficeMessagesRead(empId);
}

async function markOfficeMessagesRead(empId) {
  if (!firebaseReady) return;
  const unread = (state.messages || []).filter(m => m.employeeId === empId && m.senderRole === "staff" && !m.readByOffice);
  for (const m of unread) {
    try { await db.collection("messages").doc(m.id).update({ readByOffice: true }); } catch (e) { /* ignore */ }
  }
}

async function sendAdminMessage(empId) {
  const text = document.getElementById("chatTextInput").value.trim();
  if (!text && !state.pendingPhoto) return alert("メッセージか写真を入力してください");
  const emp = state.employees.find(e => e.id === empId) || {};

  const photoURL = state.pendingPhoto ? state.pendingPhoto.base64 : null;

  const data = {
    employeeId: empId,
    employeeName: emp.name || "",
    area: emp.area || "",
    senderRole: "office",
    senderName: state.currentUser.name || "本社",
    text, photoURL,
    readByStaff: false,
    readByOffice: true,
    createdAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };

  if (!firebaseReady) {
    state.messages = state.messages || [];
    state.messages.push({ ...data, id: "demo-" + Date.now() });
    state.pendingPhoto = null;
    document.getElementById("chatTextInput").value = "";
    return render();
  }
  try {
    await db.collection("messages").add(data);
    state.pendingPhoto = null;
    render();
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

async function sendBroadcast() {
  const text = document.getElementById("broadcastText").value.trim();
  const target = document.getElementById("broadcastTarget").value;
  if (!text) return alert("お知らせ内容を入れてください");

  let targets = state.employees || [];
  let targetLabel = "全員";
  if (target.startsWith("area:")) {
    const area = target.slice(5);
    targets = targets.filter(e => e.area === area);
    targetLabel = area + "のみ";
  }
  if (!targets.length) return alert("宛先の従業員が見つかりません");

  const broadcastId = "b" + Date.now();
  const senderName = state.currentUser.name || "本社";

  if (!firebaseReady) {
    state.messages = state.messages || [];
    targets.forEach(emp => {
      state.messages.push({
        id: "demo-" + Date.now() + "-" + emp.id,
        employeeId: emp.id, employeeName: emp.name, area: emp.area || "",
        senderRole: "office", senderName, text, photoURL: null,
        broadcastId, targetLabel,
        readByStaff: false, readByOffice: true,
        createdAt: new Date().toISOString()
      });
    });
    document.getElementById("broadcastText").value = "";
    return render();
  }

  try {
    const batch = db.batch();
    targets.forEach(emp => {
      const ref = db.collection("messages").doc();
      batch.set(ref, {
        employeeId: emp.id, employeeName: emp.name || "", area: emp.area || "",
        senderRole: "office", senderName, text, photoURL: null,
        broadcastId, targetLabel,
        readByStaff: false, readByOffice: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    document.getElementById("broadcastText").value = "";
    render();
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

render();
</script>
