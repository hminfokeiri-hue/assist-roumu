<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>アシスト労務</title>

<!-- Firebase（compat版：会計ソフトと同じ書き方） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
  :root {
    --blue: #1f7a45;
    --blue-dark: #145c33;
    --bg: #f4f6f8;
    --card: #ffffff;
    --border: #dde3ea;
    --text: #222222;
    --muted: #777777;
    --danger: #c0392b;
    --success: #1a7a4c;
    --warning: #b8860b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
  #app.admin { max-width: 900px; }

  /* パートさん向け画面は文字を濃く・太めにして見やすくする */
  .staff-scope { color: #111111; font-weight: 500; }
  .staff-scope .muted { color: #4a4a4a; }
  .staff-scope input, .staff-scope select, .staff-scope textarea { color: #111111; font-weight: 500; }

  header.topbar {
    background: var(--blue);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header.topbar h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header.topbar button {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }

  main { padding: 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }

  /* --- パートさん向け：大きめUI --- */
  .staff-title { font-size: 20px; font-weight: 700; margin: 0 0 16px; }
  .big-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .big-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px 8px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .big-btn .emoji { font-size: 30px; }
  .big-btn:active { background: #eef4fa; }
  .chat-badge {
    position: absolute; top: 10px; right: 14px;
    background: #e0453c; color: #fff; font-size: 12px; font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; padding: 0 5px;
  }

  /* --- チャット --- */
  .chat-scroll { height: 55vh; overflow-y: auto; padding: 6px 2px; display: flex; flex-direction: column; gap: 10px; }
  .chat-bubble-row { display: flex; }
  .chat-bubble-row.mine { justify-content: flex-end; }
  .chat-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5;
    background: #fff; border: 1.5px solid var(--border);
  }
  .chat-bubble-row.mine .chat-bubble { background: var(--blue); color: #fff; border-color: var(--blue); }
  .chat-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .chat-bubble-row.mine .chat-meta { text-align: right; }
  .chat-bubble img { max-width: 100%; border-radius: 10px; margin-top: 6px; display: block; }
  .chat-compose { display: flex; gap: 8px; align-items: stretch; margin-top: 10px; }
  .chat-compose textarea {
    flex: 1 1 auto;
    width: auto;
    min-width: 0;
    min-height: 90px;
    max-height: 160px;
    font-size: 18px;
    line-height: 1.5;
    padding: 14px;
    resize: none;
    margin-top: 0;
  }
  .chat-photo-btn {
    width: 66px; height: 66px; border-radius: 10px; border: 1.5px solid var(--border);
    background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; flex-shrink: 0;
    color: var(--text);
  }
  .chat-photo-btn span:first-child { font-size: 24px; }
  .chat-photo-btn span:last-child { font-size: 12px; }
  .chat-compose .chat-send-btn {
    flex: 0 0 auto;
    width: auto;
    margin-top: 0;
    padding: 12px 22px;
    white-space: nowrap;
  }
  .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .preset-btn {
    font-size: 13px; padding: 7px 12px; border-radius: 999px; border: 1.5px solid var(--border);
    background: #f4f6f8; color: var(--text); cursor: pointer;
  }
  .chat-thread-item { padding: 12px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); margin-bottom: 8px; }
  .chat-thread-item.active { background: #eef4fa; border-color: var(--primary); }
  .chat-photo-preview { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; color: var(--muted); }
  .chat-photo-preview img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; }

  label { display: block; font-size: 14px; color: var(--muted); margin: 12px 0 6px; }
  input, select, textarea {
    width: 100%;
    font-size: 16px;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #fff;
  }
  .staff-scope input, .staff-scope select, .staff-scope button.primary {
    font-size: 18px;
    padding: 16px;
  }

  button.primary {
    width: 100%;
    margin-top: 18px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
  }
  button.secondary {
    width: 100%;
    margin-top: 10px;
    background: #fff;
    color: var(--blue);
    border: 1.5px solid var(--blue);
    border-radius: 12px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
  }
  button.link { background: none; border: none; color: var(--blue); font-size: 14px; padding: 8px 0; }
  .btn-back-big {
    display: block;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
  }

  .status-pill {
    display: inline-block;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
  }
  .status-pending { background: #fdf0d5; color: var(--warning); }
  .status-approved { background: #e3f3ea; color: var(--success); }
  .status-rejected { background: #fbe6e4; color: var(--danger); }

  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .muted { color: var(--muted); font-size: 13px; }
  .req-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .req-item:last-child { border-bottom: none; }

  /* --- 本社側：ダッシュボード --- */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-card .num { font-size: 24px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 700; font-size: 12px; }

  .btn-approve, .btn-reject {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1.5px solid;
    background: #fff;
    margin-right: 6px;
  }
  .btn-approve { color: var(--success); border-color: var(--success); }
  .btn-reject { color: var(--danger); border-color: var(--danger); }

  .tabbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tabbar button {
    background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 8px 14px; font-size: 13px; font-weight: 700; color: var(--text);
  }
  .tabbar button.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .center-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { width: 100%; max-width: 380px; padding: 32px 24px; }
  .login-card h1 { font-size: 22px; color: var(--blue); text-align: center; margin-bottom: 4px; }
  .login-card p.sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  .placeholder-note {
    background: #fff8e1; border: 1px solid #f0d98c; border-radius: 10px;
    padding: 14px; font-size: 13px; color: #6b5b0e; margin-bottom: 16px;
  }
  .contract-preview table td { padding: 8px; border: 1px solid var(--border); vertical-align: top; }
  .contract-preview .c-label { background: #f4f6f8; font-weight: 700; width: 130px; white-space: nowrap; }

  @media print {
    @page { size: A4 portrait; margin: 8mm; }
    body * { visibility: hidden; }
    .contract-preview, .contract-preview * { visibility: visible; }
    .contract-preview { position: absolute; top: 0; left: 0; width: 100%; border: none; padding: 0; margin: 0; font-size: 11px; }
    .contract-preview p:first-child { font-size: 15px !important; margin-bottom: 6px !important; }
    .contract-preview table { page-break-inside: avoid; margin-bottom: 8px !important; }
    .contract-preview tr, .contract-preview td { page-break-inside: avoid; }
    .contract-preview td { padding: 2px 5px !important; height: auto !important; }
    .contract-preview td[style*="height"] { height: auto !important; }
    .no-print { display: none !important; }
  }

  /* iPhoneなど狭い画面で管理者側の2カラムが横に押し潰されないよう、縦積みにする */
  @media (max-width: 700px) {
    #app.admin { max-width: 100%; }
    .admin-chat-grid { grid-template-columns: 1fr !important; }
    .broadcast-grid { grid-template-columns: 1fr !important; }
    .broadcast-grid button.primary { width: 100%; }
    .responsive-grid { grid-template-columns: 1fr !important; }
    .stat-grid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================
   1) Firebase設定
   ここに、ご自身のFirebaseプロジェクト（assist-roumu）の
   設定情報を貼り付けてください。
   Firebaseコンソール → プロジェクトの設定 → 全般
   → 「マイアプリ」→ ウェブアプリの設定 から確認できます。
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyD1bprw7Xb6ZisnOkRKMlul_iW-rLvzf28",
  authDomain: "assist-roumu.firebaseapp.com",
  projectId: "assist-roumu",
  storageBucket: "assist-roumu.firebasestorage.app",
  messagingSenderId: "919904591114",
  appId: "1:919904591114:web:33d30e66ea4264e081eef3"
};

let db = null;
let firebaseReady = false;
let authReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  firebaseReady = firebaseConfig.apiKey !== "ここに貼り付け";
  if (firebaseReady) {
    // 画面や操作は一切変えず、裏側でアプリ自身を認証させる（Firestoreルール強化のため）
    firebase.auth().signInAnonymously().catch(e => console.error("匿名認証エラー", e));
    firebase.auth().onAuthStateChanged(user => { authReady = !!user; });
  }
} catch (e) {
  console.error("Firebase初期化エラー", e);
}

/* =========================================================
   2) 有給の比例付与テーブル（労働基準法）
   ========================================================= */
// ブラケット: 6ヶ月, 1年6ヶ月, 2年6ヶ月, 3年6ヶ月, 4年6ヶ月, 5年6ヶ月, 6年6ヶ月以上
const GRANT_TABLE = {
  4: [7, 8, 9, 10, 12, 13, 15],
  3: [5, 6, 6, 8, 9, 10, 11],
  2: [3, 4, 4, 5, 6, 6, 7],
  1: [1, 2, 2, 3, 3, 3, 3],
  5: [10, 11, 12, 14, 16, 18, 20] // 週5日以上（フルタイム相当）
};

function monthsBetween(hireDateStr, now) {
  const hire = new Date(hireDateStr);
  return (now.getFullYear() - hire.getFullYear()) * 12 + (now.getMonth() - hire.getMonth());
}

function calcAnnualGrant(hireDateStr, weeklyDays) {
  if (!hireDateStr || !weeklyDays) return 0;
  const months = monthsBetween(hireDateStr, new Date());
  if (months < 6) return 0;
  // 6ヶ月刻みのブラケット番号（0〜6）
  let bracket = Math.floor((months - 6) / 12) + 1;
  bracket = Math.min(bracket, 7) - 1;
  const table = GRANT_TABLE[weeklyDays] || GRANT_TABLE[4];
  return table[Math.max(0, Math.min(bracket, table.length - 1))];
}

/* =========================================================
   3) アプリの状態管理（ごくシンプルな自作ルーター）
   ========================================================= */
const APP_VERSION = "更新: 2026-07-03(24)";

const state = {
  currentUser: null,   // { id, name, phone, role, hireDate, weeklyDays, area }
  screen: "login",
  adminTab: "order",
  leaveRequests: [],
  employees: [],
  orders: [],
  messages: [],
  chatEmployeeId: null,
  pendingPhoto: null,
  broadcastTarget: "all"
};

const appEl = document.getElementById("app");

function render() {
  appEl.className = state.currentUser && state.currentUser.role === "admin" ? "admin" : "";
  if (state.screen === "login") return renderLogin();
  if (!state.currentUser) return renderLogin();
  if (state.currentUser.role === "admin") return renderAdmin();
  return renderStaff();
}

/* ---------- ログイン画面 ---------- */
function renderLogin() {
  appEl.innerHTML = `
    <div class="center-screen">
      <div class="card login-card">
        <h1>アシスト労務</h1>
        <p class="sub">株式会社ホームメンテナンス</p>
        ${!firebaseReady ? `<div class="placeholder-note">Firebaseの設定がまだ完了していません。コード内の firebaseConfig を入力してください。今はお試し用のダミーデータで動作します。</div>` : ""}
        <label>ログインID（8桁の数字）</label>
        <input id="loginId" type="tel" inputmode="numeric" placeholder="12345678" maxlength="8" />
        <button class="primary" onclick="handleStaffLogin()">ログインはこちら</button>

        <div style="margin-top:32px; padding-top:14px; border-top:1px solid var(--border);">
          <label style="font-size:12px;">管理者パスワード</label>
          <input id="adminPass" type="password" placeholder="管理者パスワード" style="font-size:13px; padding:8px;" />
          <button class="secondary" style="font-size:13px; padding:8px; margin-top:6px;" onclick="handleAdminLogin()">管理者はこちら</button>
        </div>
      </div>
    </div>
  `;
}

function waitForAuth(timeoutMs) {
  return new Promise(resolve => {
    if (authReady) return resolve();
    const started = Date.now();
    const iv = setInterval(() => {
      if (authReady || Date.now() - started > timeoutMs) {
        clearInterval(iv);
        resolve();
      }
    }, 100);
  });
}

async function handleStaffLogin() {
  const loginId = document.getElementById("loginId").value.trim();
  if (!loginId) return alert("ログインIDを入力してください");

  if (!firebaseReady) {
    // Firebase未設定時のダミーユーザー（動作確認用）
    state.currentUser = { id: "demo1", name: "松崎 貞子", loginId, role: "staff", area: "大阪エリア", hireDate: "2020-04-01", weeklyDays: 3 };
    state.screen = "staffHome";
    return render();
  }

  await waitForAuth(3000);

  try {
    const snap = await db.collection("employees").where("loginId", "==", loginId).limit(1).get();
    if (snap.empty) return alert("登録が見つかりません。本社にお問い合わせください。");
    const doc = snap.docs[0];
    const empData = doc.data();
    if (empData.status === "resigned") {
      return alert("このログインIDは現在ご利用いただけません。本社にお問い合わせください。");
    }
    state.currentUser = { id: doc.id, role: "staff", ...empData };
    state.screen = "staffHome";
    render();
    subscribeStaffLeaveRequests();
    subscribeStaffOrders();
    subscribeStaffMessages();
    subscribeStaffPayslips();
  } catch (e) {
    alert("接続エラーが発生しました: " + e.message);
  }
}

async function handleAdminLogin() {
  const pass = document.getElementById("adminPass").value;
  // MVP: 共通パスワード方式（会計ソフトと同じ考え方）。運用開始後に変更してください。
  const ADMIN_PASSWORD = "hm2026";
  if (pass !== ADMIN_PASSWORD) return alert("パスワードが違います");
  if (firebaseReady) await waitForAuth(3000);
  state.currentUser = { role: "admin", name: "本社担当" };
  state.screen = "adminHome";
  render();
  if (firebaseReady) { subscribeAllLeaveRequests(); subscribeAllMessages(); }
}

function logout() {
  state.currentUser = null;
  state.screen = "login";
  render();
}

/* ---------- パートさん側：ホーム ---------- */
function renderStaff() {
  const balance = calcAnnualGrant(state.currentUser.hireDate, state.currentUser.weeklyDays);
  const usedOrPending = state.leaveRequests.filter(r => r.status !== "rejected").length;

  appEl.innerHTML = `
    <header class="topbar">
      <h1>アシスト労務<span style="font-size:11px; color:#aebbcc; font-weight:400; margin-left:8px;">${APP_VERSION}</span></h1>
      <button onclick="logout()">ログアウト</button>
    </header>
    <main class="staff-scope">
      <p class="staff-title">おつかれさまです、${state.currentUser.name || ""}さん</p>

      ${state.screen === "staffHome" ? `
        <div class="big-grid">
          <button class="big-btn" onclick="state.screen='leaveForm'; render();"><span class="emoji">🗓️</span>休み申請</button>
          <button class="big-btn" onclick="state.screen='orderForm'; render();"><span class="emoji">📦</span>備品をたのむ</button>
          <button class="big-btn" style="position:relative;" onclick="openStaffChat()">
            <span class="emoji">💬</span>本社とお話し
            ${staffUnreadCount() > 0 ? `<span class="chat-badge">${staffUnreadCount()}</span>` : ""}
          </button>
          <button class="big-btn" onclick="window.location.href='tel:0666547812'"><span class="emoji">📞</span>電話する</button>
          <button class="big-btn" style="grid-column: span 2;" onclick="state.screen='payslips'; render();"><span class="emoji">📄</span>給与明細</button>
        </div>

        <div class="card" style="margin-top:20px;">
          <div class="row-between">
            <div><p class="muted" style="margin:0;">今年度の残り有給</p><p style="font-size:26px;font-weight:700;margin:4px 0;">${balance - usedOrPending >= 0 ? balance - usedOrPending : 0}日</p></div>
            <div><p class="muted" style="margin:0;">申請中・承認済み</p><p style="font-size:26px;font-weight:700;margin:4px 0;">${usedOrPending}件</p></div>
          </div>
        </div>

        ${(state.orders && state.orders.length) ? `<div class="card">${renderOrderHistory(true)}</div>` : ""}
      ` : ""}

      ${state.screen === "leaveForm" ? renderLeaveForm() : ""}
      ${state.screen === "leaveForm" ? "" : (state.screen === "orderForm" ? "" : (state.screen === "chat" ? "" : (state.screen === "payslips" ? "" : renderLeaveHistory())))}
      ${state.screen === "orderForm" ? renderOrderForm() : ""}
      ${state.screen === "chat" ? renderStaffChat() : ""}
      ${state.screen === "payslips" ? renderStaffPayslips() : ""}
    </main>
  `;

  if (state.screen === "chat") {
    const box = document.getElementById("chatScroll");
    if (box) box.scrollTop = box.scrollHeight;
  }
}

/* 品目マスタ（初期リスト） */
const ITEM_MASTER = [
  "ゴミ袋 45L", "ゴミ袋 70L", "ゴミ袋 90L",
  "トイレットペーパー", "トイレ洗剤", "手洗い石鹸水（希釈タイプ）",
  "次亜塩素酸ナトリウム", "日報", "会社用封筒", "出勤簿"
];

/* 平日17時までの受付判定 */
function isOrderAcceptable() {
  const now = new Date();
  const day = now.getDay();       // 0=日, 6=土
  const hour = now.getHours();
  if (day === 0 || day === 6) return false;
  if (hour >= 17) return false;
  return true;
}

function renderOrderForm() {
  const accepting = isOrderAcceptable();
  const selectedItem = state.orderItem || ITEM_MASTER[0];
  const isFree = selectedItem === "__free__";
  return `
    <div class="card">
      <p class="staff-title" style="font-size:17px;">備品をたのむ</p>

      ${accepting ? "" : `<div class="placeholder-note">今は受付時間外です（受付は平日の17時まで、土日祝はお休みです）。申請はできますが、本社の確認は翌営業日になります。</div>`}

      <label>発注する場所（げんば）</label>
      <input id="orderPlace" type="text" placeholder="例：○○警察署" value="${state.currentUser.workplace || ""}" />

      <label>ほしいもの</label>
      <select id="orderItemSelect" onchange="state.orderItem=this.value; render();">
        ${ITEM_MASTER.map(it => `<option value="${it}" ${it === selectedItem ? "selected" : ""}>${it}</option>`).join("")}
        <option value="__free__" ${isFree ? "selected" : ""}>その他（自分で書く）</option>
      </select>

      ${isFree ? `<input id="orderFreeText" type="text" placeholder="ほしいものを書いてください" style="margin-top:8px;" />` : ""}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function compressImageToBase64(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * (maxWidth / w)); w = maxWidth; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelect(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (file.size > 15 * 1024 * 1024) { alert("写真のサイズが大きすぎます"); return; }
  try {
    const base64 = await compressImageToBase64(file, 700, 0.55);
    if (base64.length > 900000) {
      alert("写真を圧縮しましたが、まだ少し大きいようです。別の写真でお試しください。");
      return;
    }
    state.pendingPhoto = { base64 };
    render();
  } catch (e) {
    alert("写真の読み込みに失敗しました: " + e.message);
  }
}

    const cur = new Date(minDate);
    while (cur <= maxDate) {

  if (!place) return alert("発注する場所を入れてください");

    place, item, qty,
    status: "pending",
    byPhone: true,
    handledBy: state.currentUser.name || "本社担当",

async function updateOrderStatus(id, status) {
  const handler = state.currentUser.name || "本社担当";
  if (!firebaseReady) {

    if (o) { o.status = status; o.handledBy = handler; }

  try {

// 曜日ごとの勤務時間から「月・水・金」のような一覧表示用サマリーを作る（未入力時は旧shiftDaysにフォールバック）
function shiftSummary(e) {
  const days = WEEKDAY_FIELDS.filter(([key]) => (e[key] || "").trim()).map(([, label]) => label);
  if (days.length) return days.join("・");
  return e.shiftDays || "";
}

function calcAge(birthDateStr) {
  if (!birthDateStr) return null;
  const b = new Date(birthDateStr);
  if (isNaN(b)) return null;
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
}

// 郵便番号と住所が「560-0041 豊中市…」のように結合されている旧データを表示用に分割する
function splitAddressForDisplay(editing) {
  let postalCode = editing.postalCode || "";
  let address = editing.address || "";
  if (!postalCode) {
    const m = address.match(/^(\d{3}-?\d{4})\s+(.*)$/);
    if (m) { postalCode = m[1]; address = m[2]; }
  }
  return { postalCode, address };
}

async function lookupPostalCode() {
  const zipEl = document.getElementById("emp_postalCode");
  const addrEl = document.getElementById("emp_address");
  if (!zipEl || !addrEl) return;
  const raw = zipEl.value.replace(/[^\d]/g, "");
  if (raw.length !== 7) { alert("郵便番号は7桁の数字で入力してください"); return; }
  try {
    const res = await fetch(`https://zipcloud.ibsdoc.jp/api/search?zipcode=${raw}`);
    const data = await res.json();
    if (data.results && data.results[0]) {
      const r = data.results[0];
      addrEl.value = `${r.address1}${r.address2}${r.address3}`;
    } else {
      alert("住所が見つかりませんでした。番号をご確認ください。");
    }
  } catch (e) {
    alert("住所検索に失敗しました（通信環境をご確認ください）");
  }
}

function computeEmpList() {
  const searchVal = state.empSearchVal || "";
  const areaFilter = state.empAreaFilter || "";
  const showResigned = !!state.showResignedList;
  const sortKey = state.empSortKey || "code";

  const source = state.employees.filter(e => showResigned ? e.status === "resigned" : e.status !== "resigned");
  const matchesSearch = e => {
    if (!searchVal) return true;
    const v = searchVal.toLowerCase();
    const vDigits = searchVal.replace(/[^\d]/g, "");
    const phoneDigits = (e.phone || "").replace(/[^\d]/g, "");
    const phoneMatches = vDigits && phoneDigits.includes(vDigits);
    return phoneMatches || [e.name, e.furigana, e.employeeCode, e.phone, e.workplace].some(f => (f || "").toLowerCase().includes(v));
  };
  let list = source.filter(e => matchesSearch(e) && (!areaFilter || e.area === areaFilter));
  list = list.slice().sort((a, b) => {
    if (sortKey === "name") return (a.name || "").localeCompare(b.name || "", "ja");
    if (sortKey === "age") {
      const ageA = calcAge(a.birthDate), ageB = calcAge(b.birthDate);
      if (ageA === null && ageB === null) return 0;
      if (ageA === null) return 1;
      if (ageB === null) return -1;
      return ageB - ageA; // 年上が先
    }
    return (a.employeeCode || "").localeCompare(b.employeeCode || "", "ja", { numeric: true });
  });
  return list;
}

function handleBulkImportFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let records;
    try {
      records = JSON.parse(reader.result);
      if (!Array.isArray(records)) throw new Error("配列形式ではありません");
    } catch (e) {
      document.getElementById("bulkImportPreview").innerHTML = `<p style="color:var(--danger);">ファイルの読み込みに失敗しました: ${e.message}</p>`;
      return;
    }
    state.bulkImportRecords = records;
    const noPhone = records.filter(r => !r.phone).length;
    document.getElementById("bulkImportPreview").innerHTML = `
      <p style="margin-top:10px;">${records.length}件のデータを読み込みました。${noPhone > 0 ? `（うち電話番号なし: ${noPhone}件）` : ""}</p>
      <button class="primary" onclick="runBulkImport()">この内容で登録する</button>
    `;
  };
  reader.readAsText(file);
}

async function runBulkImport() {
  const records = state.bulkImportRecords || [];
  if (!records.length) return;
  document.getElementById("bulkImportPreview").innerHTML = `<p>登録中です…しばらくお待ちください</p>`;

  if (!firebaseReady) {
    records.forEach(r => state.employees.push({ id: "demo-" + Math.random(), ...r }));
    state.showBulkImport = false;
    state.bulkImportRecords = null;
    alert("（お試し表示のため実際の保存はされません）");
    return render();
  }

  try {
    const batch = db.batch();
    records.forEach(r => {
      const ref = r.loginId ? db.collection("employees").doc(r.loginId) : db.collection("employees").doc();
      batch.set(ref, r, { merge: true });
    });
    await batch.commit();
    state.showBulkImport = false;
    state.bulkImportRecords = null;
    alert(`${records.length}件、登録できました！`);
    render();
  } catch (e) {
    alert("登録エラー: " + e.message);
  }
}

function toWareki(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
  let era, ey;
  if (y >= 2019 && !(y === 2019 && (m < 5))) { era = "令和"; ey = y - 2018; }
  else if (y >= 1989) { era = "平成"; ey = y - 1988; }
  else if (y >= 1926) { era = "昭和"; ey = y - 1925; }
  else { return dateStr; }
  if (ey === 1) ey = "元";
  return `${era}　${ey}年　${m}月　${day}日`;
}
function addMonths(dateStr, months) {
  const d = new Date(dateStr);
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
}
function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function handlePayslipFileSelect(evt) {

      <p style="margin-top:10px;">「${file.name}」を読み込みました。</p>

async function uploadPayslip() {
  const empId = state.payslipEmpId || (state.employees[0] && state.employees[0].id);
  const emp = state.employees.find(e => e.id === empId) || {};
  const month = (document.getElementById("payslipMonth") || {}).value || state.payslipMonth;
  if (!empId || !month || !state.pendingPayslip) return alert("従業員・対象月・ファイルをご確認ください");

  const data = {
    employeeId: empId,
    employeeName: emp.name || "",
    month,
    fileName: state.pendingPayslip.fileName,
    pdfBase64: state.pendingPayslip.base64,
    uploadedAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };
  const docId = empId + "_" + month;

  if (!firebaseReady) {
    state.payslips = state.payslips || [];
    const idx = state.payslips.findIndex(p => p.id === docId);
    if (idx >= 0) state.payslips[idx] = { id: docId, ...data };
    else state.payslips.push({ id: docId, ...data });
    state.pendingPayslip = null;
    alert("（お試し表示のため実際の保存はされません）");
    return render();
  }
  try {
    await db.collection("payslips").doc(docId).set(data);
    state.pendingPayslip = null;
    alert("アップロードしました");
    render();
  } catch (e) {
    alert("アップロードエラー: " + e.message);
  }
}

async function updateLeaveStatus(id, status) {
  if (!firebaseReady) {
    const r = state.leaveRequests.find(x => x.id === id);
    if (r) r.status = status;
    return render();
  }
  try {
    await db.collection("leaveRequests").doc(id).update({ status });
  } catch (e) {
    alert("更新エラー: " + e.message);
  }
}

function subscribeAllLeaveRequests() {
  db.collection("leaveRequests").orderBy("createdAt", "desc").onSnapshot(snap => {
    state.leaveRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("employees").onSnapshot(snap => {
    state.employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
    state.orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("payslips").onSnapshot(snap => {
    state.payslips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error("payslips(admin)購読エラー", err));
}

function subscribeAllMessages() {
  db.collection("messages").onSnapshot(snap => {
    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    rows.sort((a, b) => {
      const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
      const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
      return ta - tb;
    });
    state.messages = rows;
    render();
  }, err => console.error("messages(admin)購読エラー", err));
}

function adminUnreadCount() {
  if (!state.messages) return 0;
  return state.messages.filter(m => m.senderRole === "staff" && !m.readByOffice).length;
}

function renderAdminChatTab() {
  const allEmployees = state.employees || [];
  const msgs = state.messages || [];
  const showResigned = !!state.chatShowResigned;
  const employees = allEmployees.filter(e => showResigned ? e.status === "resigned" : e.status !== "resigned");
  const resignedCount = allEmployees.filter(e => e.status === "resigned").length;

  const lastActivityFor = (empId) => {
    const own = msgs.filter(m => m.employeeId === empId);
    if (!own.length) return 0;
    return Math.max(...own.map(m => (m.createdAt && m.createdAt.seconds) ? m.createdAt.seconds : 0));
  };
  const sortedEmployees = employees.slice().sort((a, b) => lastActivityFor(b.id) - lastActivityFor(a.id));

  // スマホ幅では「一覧」か「会話」のどちらか片方だけを表示する（両方常に表示すると、一覧を全部スクロールしないと会話に辿り着けなくなるため）
  const isNarrow = window.innerWidth <= 700;
  const hasOpenedThread = !!state.chatEmployeeId;
  const selectedId = state.chatEmployeeId || (!isNarrow && sortedEmployees[0] && sortedEmployees[0].id);
  const thread = msgs.filter(m => m.employeeId === selectedId && !m.broadcastId);
  const broadcasts = groupBroadcasts(msgs);
  const areas = [...new Set(allEmployees.map(e => e.area).filter(Boolean))];

  const unreadFor = (empId) => msgs.filter(m => m.employeeId === empId && m.senderRole === "staff" && !m.readByOffice).length;

  const listPanel = `
    <div>
      <div class="row-between" style="margin-bottom:8px;">
        <p class="muted" style="margin:0;">${showResigned ? "退職者一覧" : "従業員一覧（更新順）"}</p>
      </div>
      <button style="width:100%; font-size:12px; padding:7px; margin-bottom:10px;" onclick="state.chatShowResigned=!state.chatShowResigned; state.chatEmployeeId=null; render();">
        ${showResigned ? "在籍者に戻る" : `退職者とのやりとりを見る（${resignedCount}）`}
      </button>
      ${sortedEmployees.map(e => `
        <div class="chat-thread-item ${e.id === selectedId ? "active" : ""}" onclick="openAdminThread('${e.id}')">
          <div class="row-between" style="margin:0;">
            <span>${e.name || "(名前未登録)"}</span>
            ${unreadFor(e.id) > 0 ? `<span class="chat-badge" style="position:static;">${unreadFor(e.id)}</span>` : ""}
          </div>
          <div class="muted" style="font-size:12px;">${e.area || ""}</div>
        </div>
      `).join("") || `<p class="muted">${showResigned ? "退職者はいません" : "従業員データがまだありません"}</p>`}
    </div>
  `;

  const threadPanel = `
    <div>
      ${isNarrow ? `<button class="link" style="margin-bottom:8px;" onclick="state.chatEmployeeId=null; render();">← 従業員一覧にもどる</button>` : ""}
      ${selectedId ? `
        <p class="staff-title" style="font-size:16px; margin:0 0 8px;">${(allEmployees.find(e => e.id === selectedId) || {}).name || ""} さんとのやりとり${showResigned ? "（退職済み）" : ""}</p>
        <div class="chat-scroll" id="chatScroll" style="height:40vh;">
          ${thread.length ? thread.map(m => renderChatBubble(m, m.senderRole === "office")).join("") : `<p class="muted">まだメッセージはありません</p>`}
        </div>
        <div class="preset-row">
          ${PRESET_PHRASES_OFFICE.map(p => `<button type="button" class="preset-btn" onclick="insertPreset('${p}')">${p}</button>`).join("")}
        </div>
        ${state.pendingPhoto ? `
          <div class="chat-photo-preview">
            <img src="${state.pendingPhoto.base64}" />
            <span>写真を1枚 添付中</span>
            <button type="button" class="link" onclick="clearPendingPhoto()">やめる</button>
          </div>
        ` : ""}
        <div class="chat-compose">
          <input type="file" accept="image/*" id="chatPhotoInput" style="display:none;" onchange="handlePhotoSelect(event)" />
          <button type="button" class="chat-photo-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
          <textarea id="chatTextInput" placeholder="メッセージを入力"></textarea>
          <button class="primary chat-send-btn" onclick="sendAdminMessage('${selectedId}')">送信</button>
        </div>
      ` : `<p class="muted">左の一覧から従業員を選んでください</p>`}
    </div>
  `;

  const chatGridInner = isNarrow
    ? (hasOpenedThread ? threadPanel : listPanel)
    : `${listPanel}${threadPanel}`;

  return `
    <div class="card admin-chat-grid" style="display:grid; grid-template-columns:220px 1fr; gap:16px;">
      ${chatGridInner}
    </div>

    <div class="card">
      <p class="staff-title" style="font-size:16px;">お知らせを送る（全員／エリア宛て）</p>
      <div class="broadcast-grid" style="display:grid; grid-template-columns:1fr 2fr auto; gap:10px; align-items:end;">
        <div>
          <label>宛先</label>
          <select id="broadcastTarget">
            <option value="all">全員</option>
            ${areas.map(a => `<option value="area:${a}">${a}のみ</option>`).join("")}
          </select>
        </div>
        <div>
          <label>お知らせ内容</label>
          <input id="broadcastText" type="text" placeholder="例：明日は台風のため休業します" />
        </div>
        <button class="primary" style="height:46px;" onclick="sendBroadcast()">送信</button>
      </div>

      ${broadcasts.length ? `
        <div style="margin-top:16px;">
          <p class="muted" style="margin:0 0 8px;">送信したお知らせ</p>
          ${broadcasts.map(b => `
            <div class="row-between" style="margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:8px;">
              <div>
                <div>${escapeHtml(b.text)}</div>
                <span class="muted" style="font-size:12px;">${b.targetLabel}</span>
              </div>
              <span class="muted" style="font-size:13px;">既読 ${b.readCount}/${b.total}</span>
            </div>
          `).join("")}
        </div>
      ` : ""}
    </div>
  `;
}

function groupBroadcasts(msgs) {
  const map = {};
  msgs.filter(m => m.broadcastId).forEach(m => {
    if (!map[m.broadcastId]) map[m.broadcastId] = { text: m.text, targetLabel: m.targetLabel || "全員", items: [] };
    map[m.broadcastId].items.push(m);
  });
  return Object.values(map).map(b => ({
    text: b.text,
    targetLabel: b.targetLabel,
    total: b.items.length,
    readCount: b.items.filter(i => i.readByStaff).length
  }));
}

function openAdminThread(empId) {
  state.chatEmployeeId = empId;
  render();
  markOfficeMessagesRead(empId);
}

async function markOfficeMessagesRead(empId) {
  if (!firebaseReady) return;
  const unread = (state.messages || []).filter(m => m.employeeId === empId && m.senderRole === "staff" && !m.readByOffice);
  for (const m of unread) {
    try { await db.collection("messages").doc(m.id).update({ readByOffice: true }); } catch (e) { /* ignore */ }
  }
}

async function sendAdminMessage(empId) {
  const text = document.getElementById("chatTextInput").value.trim();
  if (!text && !state.pendingPhoto) return alert("メッセージか写真を入力してください");
  const emp = state.employees.find(e => e.id === empId) || {};

  const photoURL = state.pendingPhoto ? state.pendingPhoto.base64 : null;

  const data = {
    employeeId: empId,
    employeeName: emp.name || "",
    area: emp.area || "",
    senderRole: "office",
    senderName: state.currentUser.name || "本社",
    text, photoURL,
    readByStaff: false,
    readByOffice: true,
    createdAt: firebaseReady ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
  };

  if (!firebaseReady) {
    state.messages = state.messages || [];
    state.messages.push({ ...data, id: "demo-" + Date.now() });
    state.pendingPhoto = null;
    document.getElementById("chatTextInput").value = "";
    return render();
  }
  try {
    await db.collection("messages").add(data);
    state.pendingPhoto = null;
    render();
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

async function sendBroadcast() {
  const text = document.getElementById("broadcastText").value.trim();
  const target = document.getElementById("broadcastTarget").value;
  if (!text) return alert("お知らせ内容を入れてください");

  let targets = state.employees || [];
  let targetLabel = "全員";
  if (target.startsWith("area:")) {
    const area = target.slice(5);
    targets = targets.filter(e => e.area === area);
    targetLabel = area + "のみ";
  }
  if (!targets.length) return alert("宛先の従業員が見つかりません");

  const broadcastId = "b" + Date.now();
  const senderName = state.currentUser.name || "本社";

  if (!firebaseReady) {
    state.messages = state.messages || [];
    targets.forEach(emp => {
      state.messages.push({
        id: "demo-" + Date.now() + "-" + emp.id,
        employeeId: emp.id, employeeName: emp.name, area: emp.area || "",
        senderRole: "office", senderName, text, photoURL: null,
        broadcastId, targetLabel,
        readByStaff: false, readByOffice: true,
        createdAt: new Date().toISOString()
      });
    });
    document.getElementById("broadcastText").value = "";
    return render();
  }

  try {
    const batch = db.batch();
    targets.forEach(emp => {
      const ref = db.collection("messages").doc();
      batch.set(ref, {
        employeeId: emp.id, employeeName: emp.name || "", area: emp.area || "",
        senderRole: "office", senderName, text, photoURL: null,
        broadcastId, targetLabel,
        readByStaff: false, readByOffice: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    document.getElementById("broadcastText").value = "";
    render();
  } catch (e) {
    alert("送信エラー: " + e.message);
  }
}

render();
</script>
